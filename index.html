<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./img/soundiq.png">
    <title>Soundiq | Your Music</title>
</head>
<body>
    <div class="sidebar">
        <img src="img/soundiq.png" alt="">
        <div class="logo">Soundiq</div>
        <div class="menu-item" onclick="home()">Home</div>
        <div class="menu-item" onclick="searchSong()">Search</div>
    </div>
    <div class="main">
        <h1>Dla Ciebie</h1>
        <div class="playlistGrid">
            <div class="card" onclick="openPlaylist(1)">
                <img src="img/img4.jpg" alt="">
                <div class="title">Top Hits</div>
                <div class="subtitle">Playlist</div>
            </div>
            <div class="card" onclick="openPlaylist(2)">
                <img src="img/img3.jpg" alt="">
                <div class="title">Chill Songs</div>
                <div class="subtitle">Playlist</div>
            </div>
            <div class="card" onclick="openPlaylist(3)">
                <img src="img/img2.jpg" alt="">
                <div class="title">Disney Piano</div>
                <div class="subtitle">Playlist</div>
            </div>
            <div class="card" onclick="openPlaylist4(4)">
                <img src="img/img1.jpg" alt="">
                <div class="title">80's Hits</div>
                <div class="subtitle">Playlist</div>
            </div>
            <div class="card" onclick="openPlaylist(5)">
                <img src="img/img5.jpg" alt="">
                <div class="title">Polski Hip Hop</div>
                <div class="subtitle">Playlist</div>
            </div>
            <div class="card" onclick="openPlaylist()">
                <img src="img/img6.jpg" alt="">
                <div class="title">Rock</div>
                <div class="subtitle">Playlist</div>
            </div>            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
